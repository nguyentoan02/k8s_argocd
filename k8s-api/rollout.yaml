apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-api
  namespace: demo
  labels:
    app: demo-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 4
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: api
          image: w9-demo-api:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_NAME
              value: demo-api
            - name: PORT
              value: "8080"
            - name: VERSION
              value: v2
            - name: ERROR_RATE
              value: "0"
            - name: RESPONSE_DELAY_MS
              value: "0"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
  strategy:
    canary:
      analysis:
        templates:
          - templateName: demo-api-success-rate
        args:
          - name: namespace
            value: demo
          - name: service
            value: demo-api
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 100
