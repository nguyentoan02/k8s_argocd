apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-email-config
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "nvtvlog234@gmail.com"
      smtp_auth_username: "nvtvlog234@gmail.com"
      smtp_auth_password: "ybff npny augh fldn"
      smtp_require_tls: true

    route:
      receiver: personal-email
      group_by: ["alertname", "service", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: personal-email
        email_configs:
          - to: "nvtvlog234@gmail.com"
            send_resolved: true

    inhibit_rules: []
